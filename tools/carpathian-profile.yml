# Planetiler custom schema for the Carpathian OSM overlay.
#
# Reference: https://github.com/onthegomap/planetiler/blob/main/CUSTOMSCHEMA.md
#
# This profile emits the source-layers that the renderer's
# src/style/carpathian.js expects. The layer names and property names
# must match exactly — keep this file in lockstep with that module.
#
# Build with:
#   bash tools/build-carpathian-osm.sh
schema_name: Cart Carpathian
schema_description: |
  Hiking routes, raw mountain trails (path/track/footway/bridleway/via_ferrata
  /steps), mountain features, forest roads, ski pistes and cableways for the
  Ukrainian Carpathians. Built on top of OSM data; redistribution follows the ODbL.
attribution: <a href="https://www.openstreetmap.org/copyright">© OpenStreetMap contributors</a>

# Pull only the OSM tags we actually consume — keeps tile size small.
tag_mappings:
  ele: integer

layers:

  # -----------------------------------------------------------------------
  # hiking_route — every OSM relation tagged route=hiking inside the bbox.
  #
  # The Carpathian style now also drives a dedicated ribbon-overlay
  # pipeline off this layer (`src/style/hiking-routes.js`) so a single
  # named relation (Закарпатський ландшафтний шлях, Чорногірський
  # хребет, Нескучна стежка, …) reads as ONE continuous coloured ribbon
  # from start to end, regardless of how many `way`s the relation
  # stitches across. The ribbon-colour cascade is `osmc:symbol`
  # (first segment, the `<waycolour>` field) → `colour` → `network`
  # (iwn=red, nwn=blue, rwn=yellow, lwn=green) → neutral fallback.
  # The cascade is implemented entirely in the MapLibre style as a
  # `match` expression — no JS-side preprocessing of features — so
  # every per-route attribute below MUST land in the tile.
  #
  # The legacy `trail` source-layer (raw OSM ways) keeps driving the
  # per-segment SAC-scale dashed inline; the ribbon paints UNDER it,
  # giving the OSM-Hiking-Map "double signal" effect (continuous route
  # underlay + per-segment difficulty overlay).
  #
  # Attributes carried per relation (consumed both by the style
  # ribbon-cascade and by the upcoming UI route-card popup):
  #
  #   • `osmc_symbol` — primary colour cue (first segment is
  #     `<waycolour>`); also used by the route-card to render the
  #     painted way-marking glyph.
  #   • `colour`      — secondary colour fallback when
  #     `osmc:symbol` is absent.
  #   • `symbol`      — verbal description of the way-marking
  #     (e.g. "Yellow disk on tree"), shown verbatim in the popup.
  #   • `state`       — relation lifecycle (proposed / abandoned /
  #     disused / etc.); the renderer can dim or hide accordingly.
  #   • `operator`    — who maintains the route.
  #   • `distance`    — total length in km (already there; kept).
  #   • `description` — long-form route description for the popup.
  #   • `wikipedia`   — wiki link, surfaced in the popup.
  #   • `from` / `to` — start and end labels for the route-card.
  #
  # `min_zoom` lowered from 10 → 9 so the ribbon lights up at the
  # same overview zoom the trail web does (CARPATHIAN.zoomRules.trails
  # = 9). Without this match the user would see hazel dashes WITHOUT
  # the ribbon at z9-z10 and only get the ribbon "later", which
  # contradicts the "ribbon is the underlay" cartographic story.
  #
  # NOTE on Planetiler relation context: the schema-yaml
  # Planetiler profile (CUSTOMSCHEMA.md) currently exposes only
  # per-feature attributes, not parent-relation context, on the
  # `osm` source. So the attributes below are read directly off
  # the relation feature itself — which is exactly the case for
  # `hiking_route` because we filter for `type=route` +
  # `route=hiking`. No `_relations` lookup is needed, and the
  # graceful-fallback chain in `hiking-routes.js::ribbonColorExpr`
  # handles tiles that pre-date this schema change without
  # recompiling the renderer (osmc_symbol missing → colour →
  # network → neutral).
  # -----------------------------------------------------------------------
  - id: hiking_route
    features:
      - source: osm
        geometry: line
        min_zoom: 9
        include_when:
          __all__:
            type: route
            route: hiking
        attributes:
          - key: name
            tag_value: name
          - key: name:uk
            tag_value: name:uk
          - key: name:en
            tag_value: name:en
          - key: ref
            tag_value: ref
          - key: network
            tag_value: network
          - key: osmc_symbol
            tag_value: osmc:symbol
          - key: colour
            tag_value: colour
          - key: symbol
            tag_value: symbol
          - key: state
            tag_value: state
          - key: operator
            tag_value: operator
          - key: distance
            tag_value: distance
          - key: description
            tag_value: description
          - key: wikipedia
            tag_value: wikipedia
          - key: from
            tag_value: from
          - key: to
            tag_value: to

  # -----------------------------------------------------------------------
  # trail — raw highway ways used for foot / bicycle / mountaineering
  # navigation. Pulled directly from OSM (not relation-derived) so we get
  # informal stitches, side branches and via-ferrate that don't belong
  # to a route relation. The Carpathian style renders these by sac_scale,
  # trail_visibility, informal-flag, bridge / ladder / ford and via-
  # ferrata grade.
  # -----------------------------------------------------------------------
  - id: trail
    features:
      - source: osm
        geometry: line
        min_zoom: 12
        include_when:
          highway: ["path", "footway", "track", "bridleway",
                    "cycleway", "via_ferrata", "steps"]
        attributes:
          - key: name
            tag_value: name
          - key: name:uk
            tag_value: name:uk
          - key: name:en
            tag_value: name:en
          - key: highway
            tag_value: highway
          - key: sac_scale
            tag_value: sac_scale
          - key: trail_visibility
            tag_value: trail_visibility
          - key: informal
            tag_value: informal
          - key: surface
            tag_value: surface
          - key: smoothness
            tag_value: smoothness
          - key: width
            tag_value: width
          - key: incline
            tag_value: incline
          - key: bridge
            tag_value: bridge
          - key: tunnel
            tag_value: tunnel
          - key: ford
            tag_value: ford
          - key: ladder
            tag_value: ladder
          - key: mtb_scale
            tag_value: mtb:scale
          - key: mtb_scale_uphill
            tag_value: mtb:scale:uphill
          - key: ski
            tag_value: ski
          - key: piste_type
            tag_value: piste:type
          - key: access
            tag_value: access
          - key: oneway
            tag_value: oneway
          - key: ref
            tag_value: ref
          - key: network
            tag_value: network
          - key: osmc_symbol
            tag_value: osmc:symbol
          - key: colour
            tag_value: colour
          - key: via_ferrata_scale
            tag_value: via_ferrata_scale

  # -----------------------------------------------------------------------
  # mountain_feature — natural peaks, saddles, cliffs, plus a richer
  # set of point POIs the Carpathian style turns into icons:
  #   • natural   — spring, cave_entrance, rock, stone, sinkhole
  #   • man_made  — cairn, adit, wayside_shrine, cross, tower
  #   • tourism   — alpine_hut, wilderness_hut, viewpoint, camp_site
  #   • amenity   — shelter, drinking_water, toilets
  # `rank` = -ele so symbol-sort-key naturally favours tall peaks.
  # `class` is the discriminator the style reads to pick an icon.
  # -----------------------------------------------------------------------
  - id: mountain_feature
    features:
      - source: osm
        geometry: point
        min_zoom: 8
        include_when:
          natural: ["peak", "saddle", "cliff", "volcano"]
        attributes:
          - key: name
            tag_value: name
          - key: name:uk
            tag_value: name:uk
          - key: name:en
            tag_value: name:en
          - key: class
            tag_value: natural
          - key: ele
            tag_value: ele
          - key: prominence
            tag_value: prominence
          - key: rank
            value: '${ -feature.tags.ele }'
      - source: osm
        geometry: point
        min_zoom: 11
        include_when:
          mountain_pass: "yes"
        attributes:
          - key: name
            tag_value: name
          - key: name:uk
            tag_value: name:uk
          - key: name:en
            tag_value: name:en
          - key: class
            value: pass
          - key: ele
            tag_value: ele
          - key: rank
            value: '${ -feature.tags.ele }'
      # Hydrographic + geomorphologic POIs.
      - source: osm
        geometry: point
        min_zoom: 12
        include_when:
          natural: ["spring", "cave_entrance", "rock", "stone", "sinkhole"]
        attributes:
          - key: name
            tag_value: name
          - key: name:uk
            tag_value: name:uk
          - key: name:en
            tag_value: name:en
          - key: class
            tag_value: natural
          - key: ele
            tag_value: ele
      # Anthropogenic landmarks: cairns, mine adits, way-shrines, crosses, towers.
      - source: osm
        geometry: point
        min_zoom: 12
        include_when:
          man_made: ["cairn", "adit", "wayside_shrine", "cross", "tower"]
        attributes:
          - key: name
            tag_value: name
          - key: name:uk
            tag_value: name:uk
          - key: name:en
            tag_value: name:en
          - key: class
            tag_value: man_made
          - key: ele
            tag_value: ele
      # Tourism POIs — alpine huts, viewpoints, camp sites.
      - source: osm
        geometry: point
        min_zoom: 12
        include_when:
          tourism: ["alpine_hut", "wilderness_hut", "viewpoint", "camp_site"]
        attributes:
          - key: name
            tag_value: name
          - key: name:uk
            tag_value: name:uk
          - key: name:en
            tag_value: name:en
          - key: class
            tag_value: tourism
          - key: ele
            tag_value: ele
      # Amenity POIs — shelters, drinking water, toilets.
      - source: osm
        geometry: point
        min_zoom: 13
        include_when:
          amenity: ["shelter", "drinking_water", "toilets"]
        attributes:
          - key: name
            tag_value: name
          - key: name:uk
            tag_value: name:uk
          - key: name:en
            tag_value: name:en
          - key: class
            tag_value: amenity
          - key: ele
            tag_value: ele

  # -----------------------------------------------------------------------
  # forest_road — every highway=track / unclassified / path inside the
  # bbox with surface, tracktype, sac_scale info and the 4wd / motor-
  # vehicle / access / oneway flags.
  # -----------------------------------------------------------------------
  - id: forest_road
    features:
      - source: osm
        geometry: line
        min_zoom: 11
        include_when:
          __any__:
            - highway: ["track", "unclassified", "path"]
        attributes:
          - key: name
            tag_value: name
          - key: highway
            tag_value: highway
          - key: tracktype
            tag_value: tracktype
          - key: surface
            tag_value: surface
          - key: sac_scale
            tag_value: sac_scale
          - key: trail_visibility
            tag_value: trail_visibility
          - key: 4wd_only
            tag_value: 4wd_only
          - key: motor_vehicle
            tag_value: motor_vehicle
          - key: access
            tag_value: access
          - key: oneway
            tag_value: oneway

  # -----------------------------------------------------------------------
  # ski_piste — piste:type=downhill | nordic | sled.
  # -----------------------------------------------------------------------
  - id: ski_piste
    features:
      - source: osm
        geometry: line
        min_zoom: 12
        include_when:
          piste:type: ["downhill", "nordic", "sled"]
        attributes:
          - key: name
            tag_value: name
          - key: piste_type
            tag_value: piste:type
          - key: difficulty
            tag_value: piste:difficulty

  # -----------------------------------------------------------------------
  # forest_polygon — managed (landuse=forest) and natural (natural=wood)
  # forest masses in the Carpathian bbox, plus protected-area polygons
  # so the style side can lay an amber-pinstripe over заповідники.
  #
  # The renderer (src/style/carpathian.js::forestPolygonLayers) reads
  # these attributes to drive a leaf-type → fill cascade:
  #
  #   leaf_type           → primary signal (broadleaved | needleleaved
  #                         | mixed | leafless)
  #   wood (legacy)       → coniferous → needleleaved, deciduous →
  #                         broadleaved, mixed → mixed
  #   leaf_cycle          → evergreen + landuse=forest → needleleaved,
  #                         deciduous → broadleaved
  #
  # Tile size guard: `min_size` drops crumbs at every zoom so the
  # carpathian-osm.pmtiles archive doesn't bloat with noise polygons.
  # The `area` attribute is computed in m² so the style side can sort
  # large massifs first and label-gate by zoom-aware area thresholds
  # (FOREST_LABEL.minAreaForName in src/style/forest-leaf-tokens.js).
  # -----------------------------------------------------------------------
  - id: forest_polygon
    features:
      - source: osm
        geometry: polygon
        min_zoom: 8
        # 4 tile px — drops dust polygons at the lowest zoom while
        # letting Planetiler's normal simplification handle higher zooms.
        # Combined with the style-side `area` filter this gives clean
        # overview reads (only > 50 km² massifs labelled at z8) and
        # progressively finer detail toward z14.
        min_size: 4
        include_when:
          __any__:
            landuse: forest
            natural: wood
            boundary: protected_area
        attributes:
          - key: name
            tag_value: name
          - key: name:uk
            tag_value: name:uk
          - key: name:en
            tag_value: name:en
          - key: leaf_type
            tag_value: leaf_type
          - key: leaf_cycle
            tag_value: leaf_cycle
          - key: wood
            tag_value: wood
          - key: landuse
            tag_value: landuse
          - key: natural
            tag_value: natural
          - key: protect_class
            tag_value: protect_class
          - key: protected_area
            tag_value: protected_area
          # Area in square metres — used by the style for both
          # `fill-sort-key` (large massifs paint first) and
          # zoom-gated label visibility.
          - key: area
            value: '${feature.area("m2")}'

  # -----------------------------------------------------------------------
  # cableway — aerialway=cable_car | gondola | chair_lift | drag_lift | etc.
  # -----------------------------------------------------------------------
  - id: cableway
    features:
      - source: osm
        geometry: line
        min_zoom: 12
        include_when:
          aerialway: ["cable_car", "gondola", "chair_lift", "drag_lift",
                      "j-bar", "t-bar", "magic_carpet", "rope_tow"]
        attributes:
          - key: name
            tag_value: name
          - key: type
            tag_value: aerialway

sources:
  osm:
    type: osm
    # build script supplies --osm_path so this URL is a fallback only.
    url: geofabrik:ukraine
