<!doctype html>
<html lang="uk" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f4f1ea" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e1318" media="(prefers-color-scheme: dark)" />
    <!-- iOS standalone web-app behaviour -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cart" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <title>Cart · Україна — Vector Map</title>
    <!-- Inline SVG favicon — keeps the page self-contained and avoids a 404. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23005bbb'/%3E%3Cstop offset='1' stop-color='%23ffd500'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='6' fill='url(%23g)'/%3E%3Cpath d='M6 17 L13 23 L26 9' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23005bbb'/%3E%3Cstop offset='1' stop-color='%23ffd500'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='36' fill='url(%23g)'/%3E%3Cpath d='M34 95 L73 130 L146 50' fill='none' stroke='white' stroke-width='17' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <meta
      name="description"
      content="High-detail interactive vector map of Ukraine: roads, towns, forests, rivers, buildings and POIs at deep zoom levels with GPU-accelerated rendering."
    />

    <!--
      Vendor: MapLibre GL JS (renderer) + PMTiles (protocol). We deliberately
      load these as classic <script> tags so MapLibre's worker bootstrap
      works without import-map gymnastics; our own code uses ES modules.
    -->
    <!--
      MapLibre 5.6.0+ is required for the native `color-relief` layer
      (PR #5742). On older builds the renderer silently skips the layer
      and the hypsometric subsystem falls back to the raster path.
    -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.7.0/dist/maplibre-gl.css"
      crossorigin="anonymous"
    />
    <script
      src="https://unpkg.com/maplibre-gl@5.7.0/dist/maplibre-gl.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/pmtiles@4.4.0/dist/pmtiles.js"></script>
    <!--
      maplibre-contour — worker-based topographic contours generated from
      raster-DEM tiles. Exposes window.mlcontour. Optional: contour layers
      silently disable if this script fails to load.
    -->
    <script src="https://unpkg.com/maplibre-contour@0.1.0/dist/index.min.js"></script>

    <link rel="stylesheet" href="./styles.css" />

    <!-- Entry: ES modules, no bundler required. -->
    <script type="module" src="./src/main.js"></script>
  </head>
  <body>
    <div id="app" data-state="booting">
      <main id="canvas">
        <div id="map" class="map" aria-label="Інтерактивна векторна карта України"></div>
        <div id="hud" class="hud-host" aria-live="polite"></div>
      </main>

      <!--
        On mobile this becomes a bottom-sheet that slides up. On desktop it
        is a left rail. The same DOM, the layout switches via CSS.
      -->
      <aside id="sidebar" class="sidebar" data-state="expanded"></aside>

      <!-- Backdrop for the mobile bottom-sheet expanded state. -->
      <div id="scrim" class="scrim" data-visible="0" aria-hidden="true"></div>

      <div class="splash" aria-hidden="true">
        <div class="splash-inner">
          <div class="splash-loader"></div>
          <p>Завантаження векторних тайлів…</p>
        </div>
      </div>
    </div>
  </body>
</html>
